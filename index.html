<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="css/app.css">
<title>Fotoperiodo — Finca Olas</title>
</head>
<body>
<div class="offline-banner" id="offline-banner">Modo Offline — Finca Olas</div>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-title">Fotoperiodo</div>
    <input class="login-input" type="text" id="login-nombre" placeholder="Nombre Operario">
    <div class="login-pin-wrap">
      <input class="login-pin" type="tel" maxlength="1" oninput="pinInput(this,0)">
      <input class="login-pin" type="tel" maxlength="1" oninput="pinInput(this,1)">
      <input class="login-pin" type="tel" maxlength="1" oninput="pinInput(this,2)">
      <input class="login-pin" type="tel" maxlength="1" oninput="pinInput(this,3)">
    </div>
    <button class="login-btn" onclick="intentarLogin()">Ingresar</button>
  </div>
</div>

<div class="app-shell" id="app-shell">
  <div class="hdr">
    <div class="hdr-title" id="hdr-semana">Semana —</div>
    <div class="sync-chip"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">Online</span></div>
  </div>

  <div class="body">
    <div class="screen show" id="sc-inicio">
      <div class="sec-lbl">Bloques con Luces</div>
      <div class="bloques-grid" id="grid-activos"></div>
    </div>

    <div class="screen" id="sc-siembra">
      <div class="sec-lbl">Iniciar Luces (Mapa Visual)</div>
      <div class="card">
        
        <label style="font-weight: bold; color: var(--verde-d);">1. Seleccione el Bloque</label>
        <select id="s-bloque" onchange="renderMapaCamas()" class="login-input" style="margin-top: 5px; background-color: #fff; border: 1px solid var(--borde); width: 100%; height: 45px; font-size: 16px;"></select>
        
        <label style="margin-top: 15px; display: block; font-weight: bold; color: var(--verde-d);">2. Seleccione el Lado</label>
        <div class="unidad-sel" style="margin-top: 5px;">
          <button class="unidad-btn sel" id="btn-ladoA" onclick="cambiarLado('A')">Lado A</button>
          <button class="unidad-btn" id="btn-ladoB" onclick="cambiarLado('B')">Lado B</button>
        </div>

        <label style="margin-top: 15px; display: block; font-weight: bold; color: var(--verde-d);">3. Toque la cama a encender</label>
        <div class="mapa-camas" id="mapa-grid" style="margin-top: 10px;"></div>

        <label style="margin-top: 15px; display: block; font-weight: bold; color: var(--verde-d);">4. Variedad Programada</label>
        <select id="s-variedad" class="login-input" style="margin-top: 5px; background-color: #fff; border: 1px solid var(--borde); width: 100%; height: 45px; font-size: 16px;"></select>
        
        <button class="btn-g" style="margin-top: 20px;" onclick="guardarNuevaSiembra()">Confirmar Inicio</button>
        <div class="msg" id="msg-siembra"></div>
      </div>
    </div>

    <div class="screen" id="sc-historial-global"><div id="historial-global-content"></div></div>
    
    <div class="screen" id="sc-detalle"><div id="det-title"></div><div id="dv-horometros"></div></div>
  </div>

  <div class="bot-nav">
    <button class="nav-btn sel" id="nb-bloques" onclick="irBloques()"><span>☰</span>Bloques</button>
    <button class="nav-btn" id="nb-siembra" onclick="irSiembra()"><span>🌱</span>Siembra</button>
    <button class="nav-btn" id="nb-historial" onclick="irHistorialGlobal()"><span>📋</span>Historial</button>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
